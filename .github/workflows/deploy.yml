name: Deploy API to VPS

# Runs ONLY after the "CI" workflow succeeds on main — a red build never deploys. It then
# checks whether the backend actually changed in that commit before touching the VPS, so a
# UI-only commit skips the rebuild (the mirror of Netlify's frontend-only build filter).
# A manual run (workflow_dispatch) force-deploys, bypassing both gates.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: api-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gate 1: CI must have passed on main (manual dispatch bypasses this).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2
      # Gate 2: only deploy when the backend (or its deploy config) changed in this commit.
      - name: Did the backend change?
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet HEAD^ HEAD -- backend docker-compose.prod.yml .github/workflows/deploy.yml; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No backend changes in this commit — skipping VPS deploy."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy via SSH
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s          # TCP connect timeout (default 30s) — tolerate a momentarily slow/busy VPS
          command_timeout: 20m  # build + cold-start wait can exceed the 10m default
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/dev/apps/ai-cpa
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build api
            # Cold start pulls heavy imports (weasyprint/pyhanko/openai/firebase) — give it up to ~3min.
            # A transient curl exit 52 (empty reply) is EXPECTED while uvicorn is still importing behind
            # the docker port proxy; only a sustained failure is a real problem.
            echo "waiting for the API to come up..."
            ok=0
            for i in $(seq 1 90); do
              if curl -fsS http://localhost:8001/healthz >/dev/null 2>&1; then ok=1; break; fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml ps api
            if [ "$ok" != "1" ]; then
              echo "API did not pass /healthz within ~180s — recent container logs:"
              docker compose -f docker-compose.prod.yml logs --tail=120 api || true
              exit 1
            fi
            curl -fsS http://localhost:8001/healthz; echo
            curl -fsS http://localhost:8001/readyz;  echo   # confirms the new container reaches Firestore
            echo "API deploy succeeded."
